services:
  choser:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: choser-edp
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ZAI_API_KEY=\${ZAI_API_KEY}
      - ZAI_MODEL=${ZAI_MODEL:-GLM-5.1}
      - ZAI_BASE_URL=${ZAI_BASE_URL:-https://open.bigmodel.cn/api/coding/paas/v4}
    env_file:
      - .env
    volumes:
      - C:\ChoserDB\data:/app/data
      - C:\ChoserDB\backup:/app/backup
    mem_limit: ${MEM_LIMIT:-2g}
    cpus: ${CPUS:-2}
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/v1/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
